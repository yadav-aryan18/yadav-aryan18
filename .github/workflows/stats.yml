name: Generate Stats Cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Generates the overall stats image locally
      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: 'username=yadav-aryan18&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Generates the language breakdown image locally
      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=yadav-aryan18&layout=compact&theme=tokyonight&hide_border=true'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Commits the generated files back into your main branch
      - name: Commit and Push Cards
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p profile
          git add profile/stats.svg profile/top-langs.svg
          git diff-index --quiet HEAD || git commit -m "Automated update of local stats cards"
          git push
